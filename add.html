<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Add Course</title>
</head>
<body>
    <header>
             <nav>
                <h1 class="logo">Course Organizer</h1>
                <a href="index.html">Home</a>
                <a href="mycourse.html">My Courses</a>
                <a href="add.html">Add Courses</a>
                <a href="contact.html">Contact</a>
            </nav>
    </header>
    <h1 class="title">Add New Course</h1>
    <main>
        <form action="success.html">
            <div class="row">
                <label class="labels">Course Name:</label>
                <input type="text" name="coursename" required>
                <label class="labels">Instructor:</label>
                <input type="text" name="instructor" pattern="[A-Za-z\s]+" title="Letters only, no numbers" required>
                <label class="labels">Credit Hours:</label>
                <input type="number" required>
                <label class="labels">Notes:</label>
                <textarea ></textarea>
            </div>
            <button type="submit" class="btn">Add Course</button>
        </form>
    </main>
    <footer>
            <p>&copy; Course organizer  ||  All Rights Reserved</p>
    </footer>
    
</body>
</html>
